name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        # Remove the lockfile + `npm install` (not `npm ci`): the committed lockfiles were
        # generated on macOS/another npm version, which the runner's npm rejects (EUSAGE)
        # and which triggers npm's optional-deps bug (#4828 — the Linux @rollup/* binary
        # vitest needs is skipped). A fresh resolution on the runner picks platform-correct
        # binaries. --legacy-peer-deps tolerates RN/Expo peer ranges (React 19). A
        # typecheck/test gate needs no lockfile reproducibility and never commits it.
        run: rm -f package-lock.json && npm install --no-audit --no-fund --legacy-peer-deps
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  apps:
    name: ${{ matrix.app }} — typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [web, vendor-portal, admin-portal, mobile-app]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        # Remove the lockfile + `npm install` (not `npm ci`): the committed lockfiles were
        # generated on macOS/another npm version, which the runner's npm rejects (EUSAGE)
        # and which triggers npm's optional-deps bug (#4828 — the Linux @rollup/* binary
        # vitest needs is skipped). A fresh resolution on the runner picks platform-correct
        # binaries. --legacy-peer-deps tolerates RN/Expo peer ranges (React 19). A
        # typecheck/test gate needs no lockfile reproducibility and never commits it.
        run: rm -f package-lock.json && npm install --no-audit --no-fund --legacy-peer-deps
      - name: Typecheck
        run: npx tsc --noEmit
