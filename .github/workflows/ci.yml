name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  backend:
    name: Backend — typecheck + tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        # `npm install` (not `npm ci`) so the pipeline tolerates lockfiles generated by a
        # slightly different npm version than the runner's — a typecheck/test gate doesn't
        # need strict lockfile reproducibility, and CI never commits the lockfile.
        run: npm install --no-audit --no-fund
      - name: Generate Prisma client
        run: npx prisma generate
      - name: Typecheck
        run: npm run typecheck
      - name: Unit tests
        run: npm test

  apps:
    name: ${{ matrix.app }} — typecheck
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        app: [web, vendor-portal, admin-portal, mobile-app]
    defaults:
      run:
        working-directory: apps/${{ matrix.app }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - name: Install
        # `npm install` (not `npm ci`) so the pipeline tolerates lockfiles generated by a
        # slightly different npm version than the runner's — a typecheck/test gate doesn't
        # need strict lockfile reproducibility, and CI never commits the lockfile.
        run: npm install --no-audit --no-fund
      - name: Typecheck
        run: npx tsc --noEmit
