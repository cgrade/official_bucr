openapi: 3.0.3
info:
  title: BUCR API
  description: |
    API for BUCR - Restaurant Reservation & Ordering Platform
    
    ## Authentication
    Most endpoints require JWT Bearer token authentication.
    Obtain tokens via `/api/auth/login` or `/api/auth/register`.
    
    ## Rate Limiting
    - Standard API: 100 requests per 15 minutes
    - Auth endpoints: 5 requests per minute
    - Upload endpoints: 10 requests per minute
  version: 1.0.0
  contact:
    name: BUCR Support
    email: support@bucr.com

servers:
  - url: http://localhost:3000
    description: Development server
  - url: https://api.bucr.com
    description: Production server

tags:
  - name: Auth
    description: Authentication endpoints
  - name: Users
    description: User management
  - name: Vendors
    description: Restaurant/vendor operations
  - name: Reservations
    description: Booking management
  - name: Orders
    description: Takeout/delivery orders
  - name: Credits
    description: Credit wallet operations
  - name: Admin
    description: Admin-only operations

components:
  securitySchemes:
    BearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

  schemas:
    User:
      type: object
      properties:
        id:
          type: string
          format: uuid
        email:
          type: string
          format: email
        name:
          type: string
        phone:
          type: string
        avatar:
          type: string
          nullable: true
        creditsBalance:
          type: integer
        referralCode:
          type: string
        createdAt:
          type: string
          format: date-time

    Vendor:
      type: object
      properties:
        id:
          type: string
          format: uuid
        businessName:
          type: string
        slug:
          type: string
        description:
          type: string
        cuisineTypes:
          type: array
          items:
            type: string
        averageRating:
          type: number
          format: float
        totalReviews:
          type: integer
        isFeatured:
          type: boolean
        isVerified:
          type: boolean
        mainBranch:
          $ref: '#/components/schemas/Branch'
        coverImage:
          type: string
          nullable: true

    VendorDetail:
      allOf:
        - $ref: '#/components/schemas/Vendor'
        - type: object
          properties:
            branches:
              type: array
              items:
                $ref: '#/components/schemas/Branch'
            menu:
              type: array
              items:
                $ref: '#/components/schemas/MenuItem'
            gallery:
              type: array
              items:
                $ref: '#/components/schemas/GalleryImage'
            reviews:
              type: array
              items:
                $ref: '#/components/schemas/Review'
            experiences:
              type: array
              items:
                $ref: '#/components/schemas/Experience'

    Branch:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        address:
          type: string
        city:
          type: string
        state:
          type: string
        phone:
          type: string
        operatingHours:
          type: object
        isMainBranch:
          type: boolean

    MenuItem:
      type: object
      properties:
        id:
          type: string
          format: uuid
        name:
          type: string
        description:
          type: string
        price:
          type: integer
          description: Price in kobo
        image:
          type: string
          nullable: true
        isAvailable:
          type: boolean
        category:
          type: object
          properties:
            id:
              type: string
            name:
              type: string

    GalleryImage:
      type: object
      properties:
        id:
          type: string
          format: uuid
        url:
          type: string
        alt:
          type: string
        isPrimary:
          type: boolean

    Review:
      type: object
      properties:
        id:
          type: string
          format: uuid
        rating:
          type: integer
          minimum: 1
          maximum: 5
        text:
          type: string
        createdAt:
          type: string
          format: date-time
        vendorResponse:
          type: string
          nullable: true
        user:
          type: object
          properties:
            id:
              type: string
            name:
              type: string
            avatar:
              type: string
              nullable: true

    Experience:
      type: object
      properties:
        id:
          type: string
          format: uuid
        title:
          type: string
        description:
          type: string
        type:
          type: string
          enum: [tasting_menu, private_dining, chef_table, cooking_class, wine_pairing]
        creditsRequired:
          type: integer
        capacity:
          type: integer
        duration:
          type: integer
          description: Duration in minutes

    Reservation:
      type: object
      properties:
        id:
          type: string
          format: uuid
        reference:
          type: string
        date:
          type: string
          format: date
        time:
          type: string
        partySize:
          type: integer
        status:
          type: string
          enum: [pending, confirmed, seated, completed, cancelled, no_show]
        creditsDeposited:
          type: integer
        vendor:
          $ref: '#/components/schemas/Vendor'
        branch:
          $ref: '#/components/schemas/Branch'

    Order:
      type: object
      properties:
        id:
          type: string
          format: uuid
        orderNumber:
          type: string
        orderType:
          type: string
          enum: [takeout, delivery]
        status:
          type: string
          enum: [pending, confirmed, preparing, ready, out_for_delivery, completed, cancelled]
        subtotal:
          type: integer
        deliveryFee:
          type: integer
        total:
          type: integer
        items:
          type: array
          items:
            type: object
            properties:
              menuItem:
                $ref: '#/components/schemas/MenuItem'
              quantity:
                type: integer
              price:
                type: integer

    Pagination:
      type: object
      properties:
        page:
          type: integer
        limit:
          type: integer
        total:
          type: integer
        totalPages:
          type: integer
        hasNext:
          type: boolean
        hasPrev:
          type: boolean

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
          example: true
        data:
          type: object
        message:
          type: string

    ErrorResponse:
      type: object
      properties:
        success:
          type: boolean
          example: false
        error:
          type: string

    PaginatedResponse:
      type: object
      properties:
        success:
          type: boolean
        data:
          type: object
          properties:
            items:
              type: array
              items: {}
            pagination:
              $ref: '#/components/schemas/Pagination'

paths:
  /api/auth/register:
    post:
      tags: [Auth]
      summary: Register new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password, name]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
                  minLength: 8
                name:
                  type: string
                phone:
                  type: string
                referralCode:
                  type: string
      responses:
        '201':
          description: User registered successfully
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
        '409':
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'
        '422':
          description: Validation error
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/login:
    post:
      tags: [Auth]
      summary: Login user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [email, password]
              properties:
                email:
                  type: string
                  format: email
                password:
                  type: string
      responses:
        '200':
          description: Login successful
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
                          accessToken:
                            type: string
                          refreshToken:
                            type: string
        '401':
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/me:
    get:
      tags: [Auth]
      summary: Get current user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Current user data
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: object
                        properties:
                          user:
                            $ref: '#/components/schemas/User'
        '401':
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/auth/refresh:
    post:
      tags: [Auth]
      summary: Refresh access token
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [refreshToken]
              properties:
                refreshToken:
                  type: string
      responses:
        '200':
          description: Tokens refreshed
          content:
            application/json:
              schema:
                type: object
                properties:
                  accessToken:
                    type: string
                  refreshToken:
                    type: string

  /api/auth/logout:
    post:
      tags: [Auth]
      summary: Logout user
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Logout successful

  /api/vendors:
    get:
      tags: [Vendors]
      summary: List vendors
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            minimum: 1
            default: 1
        - name: limit
          in: query
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 20
        - name: search
          in: query
          schema:
            type: string
        - name: city
          in: query
          schema:
            type: string
        - name: cuisine
          in: query
          schema:
            type: string
        - name: minRating
          in: query
          schema:
            type: number
        - name: featured
          in: query
          schema:
            type: boolean
      responses:
        '200':
          description: Vendor list
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'

  /api/vendors/{slug}:
    get:
      tags: [Vendors]
      summary: Get vendor details
      parameters:
        - name: slug
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Vendor details
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        $ref: '#/components/schemas/VendorDetail'
        '404':
          description: Vendor not found
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ErrorResponse'

  /api/experiences:
    get:
      tags: [Vendors]
      summary: List all experiences
      responses:
        '200':
          description: Experiences list
          content:
            application/json:
              schema:
                allOf:
                  - $ref: '#/components/schemas/SuccessResponse'
                  - type: object
                    properties:
                      data:
                        type: array
                        items:
                          $ref: '#/components/schemas/Experience'

  /api/users/reservations:
    get:
      tags: [Reservations]
      summary: Get user reservations
      security:
        - BearerAuth: []
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [upcoming, past, cancelled]
      responses:
        '200':
          description: User reservations
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags: [Reservations]
      summary: Create reservation
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vendorId, branchId, date, time, partySize]
              properties:
                vendorId:
                  type: string
                branchId:
                  type: string
                experienceId:
                  type: string
                date:
                  type: string
                  format: date
                time:
                  type: string
                partySize:
                  type: integer
                  minimum: 1
                specialRequests:
                  type: string
      responses:
        '201':
          description: Reservation created
        '400':
          description: Insufficient credits or invalid data
        '409':
          description: Time slot not available

  /api/users/orders:
    get:
      tags: [Orders]
      summary: Get user orders
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User orders
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/PaginatedResponse'
    post:
      tags: [Orders]
      summary: Create order
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vendorId, branchId, orderType, items]
              properties:
                vendorId:
                  type: string
                branchId:
                  type: string
                orderType:
                  type: string
                  enum: [takeout, delivery]
                items:
                  type: array
                  items:
                    type: object
                    properties:
                      menuItemId:
                        type: string
                      quantity:
                        type: integer
                deliveryAddress:
                  type: string
                deliveryCity:
                  type: string
                scheduledTime:
                  type: string
                  format: date-time
      responses:
        '201':
          description: Order created

  /api/users/credits:
    get:
      tags: [Credits]
      summary: Get credit balance and transactions
      security:
        - BearerAuth: []
      responses:
        '200':
          description: Credit information
          content:
            application/json:
              schema:
                type: object
                properties:
                  balance:
                    type: integer
                  transactions:
                    type: array
                    items:
                      type: object
                      properties:
                        id:
                          type: string
                        type:
                          type: string
                        amount:
                          type: integer
                        description:
                          type: string
                        createdAt:
                          type: string
                          format: date-time

  /api/users/favorites:
    get:
      tags: [Users]
      summary: Get user favorites
      security:
        - BearerAuth: []
      responses:
        '200':
          description: User favorites
    post:
      tags: [Users]
      summary: Add to favorites
      security:
        - BearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [vendorId]
              properties:
                vendorId:
                  type: string
      responses:
        '201':
          description: Added to favorites

  /api/users/favorites/{id}:
    delete:
      tags: [Users]
      summary: Remove from favorites
      security:
        - BearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: string
      responses:
        '200':
          description: Removed from favorites
